<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Market MCP Agent</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(120deg, #e0e7ff 0%, #f7f7f7 100%);
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }
        .container {
            max-width: 700px;
            margin: 48px auto 0 auto;
            background: #fff;
            border-radius: 18px;
            box-shadow: 0 4px 32px rgba(60,80,180,0.10), 0 1.5px 6px rgba(0,0,0,0.04);
            padding: 36px 28px 120px 28px;
            position: relative;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            font-size: 2.2rem;
            letter-spacing: 1px;
            margin-bottom: 18px;
        }
        form {
            display: flex;
            gap: 10px;
            padding-left: 16px;
            padding-right: 16px;
        }
        .bottom-bar {
            position: fixed;
            left: 50%;
            transform: translateX(-50%);
            bottom: 0;
            background: #fff;
            box-shadow: 0 -2px 16px rgba(60,80,180,0.10), 0 -1.5px 6px rgba(0,0,0,0.04);
            padding: 18px 0 14px 0;
            z-index: 100;
            max-width: 700px;
            width: 100%;
            border-radius: 16px 16px 0 0;
            margin-bottom: 0;
        }
        .container { padding-bottom: 130px; }
        input[type="text"] {
            flex: 2 1 0%;
            padding: 18px 18px;
            border: 1.5px solid #bfc9e0;
            border-radius: 7px;
            font-size: 1.18rem;
            background: #f7faff;
            transition: border 0.2s;
        }
        input[type="text"]:focus {
            border: 1.5px solid #5b7fff;
            outline: none;
            background: #f0f4ff;
        }
        button {
            padding: 7px 14px;
            background: linear-gradient(90deg, #4f8cff 0%, #6e7fff 100%);
            color: #fff;
            border: none;
            border-radius: 7px;
            font-size: 0.98rem;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(60,80,180,0.07);
            transition: background 0.2s;
        }
        button:hover {
            background: linear-gradient(90deg, #6e7fff 0%, #4f8cff 100%);
        }
        .result {
            background: #f6f8fe;
            border-radius: 10px;
            padding: 22px 20px 18px 20px;
            margin-top: 22px;
            box-shadow: 0 2px 8px rgba(60,80,180,0.06);
        }
        .error {
            color: #c0392b;
            background: #fff0f0;
            border-radius: 6px;
            padding: 10px 14px;
            margin: 10px 0;
            font-weight: 500;
        }
        .tab-container {
            display: flex;
            gap: 8px;
            margin-bottom: 18px;
        }
        .tab-btn {
            padding: 10px 24px;
            border: none;
            border-radius: 8px 8px 0 0;
            background: #eaeaea;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.08rem;
            letter-spacing: 0.5px;
            transition: background 0.2s, color 0.2s;
        }
        .tab-btn.active {
            background: #f6f8fe;
            color: #4f8cff;
            border-bottom: 2.5px solid #4f8cff;
        }
        .tab-content {
            background: #f6f8fe;
            border-radius: 0 0 10px 10px;
            padding: 20px 16px 10px 16px;
            min-height: 120px;
        }
        /* Chat bubbles */
        #chatOutput {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 10px;
        }
        .chat-bubble {
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 16px;
            font-size: 1.07rem;
            box-shadow: 0 1.5px 6px rgba(60,80,180,0.07);
            margin-bottom: 0;
            word-break: break-word;
        }
        .chat-bubble.user {
            align-self: flex-end;
            background: linear-gradient(90deg, #e0e7ff 0%, #c7d2fe 100%);
            color: #2c3e50;
        }
        .chat-bubble.agent {
            align-self: flex-start;
            background: #fff;
            color: #2c3e50;
            border: 1.5px solid #e0e7ff;
        }
        /* Responsive */
        @media (max-width: 800px) {
            .container, .bottom-bar {
                max-width: 98vw;
                padding-left: 2vw;
                padding-right: 2vw;
            }
            .tab-content {
                padding: 12px 2vw 8px 2vw;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Stock Market MCP Agent</h1>
        <div id="chatTab" class="tab-content" style="display:none;">
            <div id="chatOutput" style="display:none;min-height:80px;"></div>
        </div>
        <div class="bottom-bar" id="chatBar">
            <div style="display:flex;gap:8px;align-items:center;">
                <form id="chatForm" style="flex:1;display:flex;gap:8px;margin-bottom:0;">
                    <input type="text" id="chatInput" placeholder="Ask about a company or stock..." required />
                    <button type="submit">Send</button>
                </form>
                <select id="modelSelect" style="padding:8px 10px;border-radius:4px;border:1px solid #ccc;">
                    <option value="llama3">Llama 3</option>
                    <option value="qwen3">Qwen 3</option>
                    <option value="gemma3">Gemma 3</option>
                </select>
                <button id="newStockBtn" style="background:#e67e22;color:#fff;padding:10px 16px;border:none;border-radius:4px;cursor:pointer;margin-right:16px;">Restart</button>
            </div>
        </div>
    </div>
    <script>
        // Analyze tab removed: all logic now chat only
        const chatForm = document.getElementById('chatForm');
        const chatInput = document.getElementById('chatInput');
        const chatOutput = document.getElementById('chatOutput');
        let chatHistory = [];
        let lastStock = '';
        const newStockBtn = document.getElementById('newStockBtn');
        newStockBtn.onclick = () => {
            chatHistory = [];
            lastStock = '';
            chatOutput.innerHTML = '';
            chatOutput.style.display = 'none';
            document.getElementById('chatTab').style.display = 'none';
            chatInput.value = '';
            chatInput.focus();
        };
        chatForm.onsubmit = async (e) => {
            e.preventDefault();
            const userMsg = chatInput.value.trim();
            // If this is the first message or user enters a new stock, reset chat
            if (chatHistory.length === 0 || (userMsg && userMsg.toLowerCase() !== lastStock.toLowerCase() && chatHistory.length === 1)) {
                chatHistory = [];
                chatOutput.innerHTML = '';
                lastStock = userMsg;
            }
            chatHistory.push({role:'user', content:userMsg});
            document.getElementById('chatTab').style.display = 'block';
            chatOutput.style.display = 'flex';
            chatOutput.innerHTML += `<div style='margin:18px 0 8px 0;'><b>You:</b> ${userMsg}</div>`;
            chatInput.value = '';
            const model = document.getElementById('modelSelect').value;
            const res = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ history: chatHistory, model })
            });
            const data = await res.json();
            if(data.reply) {
                chatHistory.push({role:'assistant', content:data.reply});
                chatOutput.innerHTML += `<div style='margin-bottom:18px;'><b>Agent:</b></div><span class='agent-reply'></span>`;
                // Render as HTML for markup support
                chatOutput.querySelectorAll('.agent-reply')[chatOutput.querySelectorAll('.agent-reply').length-1].innerHTML = data.reply;
            }
            chatOutput.scrollTop = chatOutput.scrollHeight;
        };
        // On page load, keep chat output hidden until user interacts
        window.onload = () => {
            document.getElementById('chatTab').style.display = 'none';
        };
    </script>
</body>
</html>
