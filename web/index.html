<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Market Agent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --primary-blue: #4f8cff;
            --primary-blue-dark: #3a6fdb;
            --bg-main: #f7f9fb;
            --bg-card: #ffffff;
            --bg-input: #f7faff;
            --border-color: #bfc9e0;
            --border-focus: #5b7fff;
            --text-primary: #2c3e50;
            --text-secondary: #5a6c7d;
            --shadow-sm: 0 2px 8px rgba(60, 80, 180, 0.06);
            --shadow-md: 0 4px 16px rgba(60, 80, 180, 0.10);
            --shadow-lg: 0 -2px 12px rgba(60, 80, 180, 0.10);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-main);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            background: var(--bg-card);
            border-bottom: 1px solid #e5e7eb;
            padding: 1.25rem 2rem;
            box-shadow: var(--shadow-sm);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-blue);
            letter-spacing: -0.5px;
        }

        /* Main Content */
        main {
            flex: 1;
            width: 100%;
            max-width: 100vw;
            padding: 2rem 1rem 120px 1rem;
            overflow-y: auto;
        }

        .chat-area {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            padding: 0 1rem;
        }

        /* Chat Messages */
        .message {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .message-label {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-secondary);
            padding-left: 0.25rem;
        }

        .message-content {
            background: var(--bg-card);
            padding: 1.25rem 1.5rem;
            border-radius: 12px;
            box-shadow: var(--shadow-sm);
            border: 1px solid #e5e7eb;
            line-height: 1.7;
        }

        .message-content.user {
            background: linear-gradient(135deg, #e0e7ff 0%, #c7d2fe 100%);
            border-color: #c7d2fe;
        }

        .message-content a {
            color: var(--primary-blue);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .message-content a:hover {
            color: var(--primary-blue-dark);
            text-decoration: underline;
        }

        .message-content ul {
            margin: 0.75rem 0 0.75rem 1.5rem;
        }

        .message-content li {
            margin: 0.5rem 0;
        }

        .message-content table {
            width: 100%;
            margin: 1rem 0;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        .message-content th,
        .message-content td {
            padding: 0.75rem;
            text-align: left;
            border: 1px solid #e5e7eb;
        }

        .message-content th {
            background: var(--bg-main);
            font-weight: 600;
        }

        /* Bottom Input Bar */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-card);
            border-top: 1px solid #e5e7eb;
            box-shadow: var(--shadow-lg);
            padding: 1.25rem 1rem;
            z-index: 200;
        }

        .input-container {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }

        .chat-form {
            flex: 1;
            display: flex;
            gap: 0.75rem;
        }

        input[type="text"] {
            flex: 1;
            padding: 0.875rem 1.25rem;
            border: 1.5px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            background: var(--bg-input);
            transition: all 0.2s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--border-focus);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(79, 140, 255, 0.1);
        }

        select {
            padding: 0.875rem 1rem;
            border: 1.5px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.9rem;
            font-family: inherit;
            background: var(--bg-card);
            cursor: pointer;
            transition: border-color 0.2s;
        }

        select:focus {
            outline: none;
            border-color: var(--border-focus);
        }

        button {
            padding: 0.875rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        button.primary {
            background: linear-gradient(135deg, var(--primary-blue) 0%, var(--primary-blue-dark) 100%);
            color: white;
            box-shadow: 0 2px 8px rgba(79, 140, 255, 0.25);
        }

        button.primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(79, 140, 255, 0.35);
        }

        button.primary:active {
            transform: translateY(0);
        }

        button.secondary {
            background: #f3f4f6;
            color: var(--text-primary);
        }

        button.secondary:hover {
            background: #e5e7eb;
        }

        /* Loading State */
        .loading {
            display: inline-block;
            width: 1rem;
            height: 1rem;
            border: 2px solid #f3f4f6;
            border-top-color: var(--primary-blue);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 3rem 2rem;
            color: var(--text-secondary);
        }

        .empty-state h2 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .empty-state p {
            font-size: 1rem;
        }

        /* Tooltips */
        [title] {
            border-bottom: 1px dotted var(--border-color);
            cursor: help;
        }

        /* Responsive */
        @media (max-width: 768px) {
            header {
                padding: 1rem 1.25rem;
            }

            .logo {
                font-size: 1.25rem;
            }

            main {
                padding: 1.5rem 0.5rem 100px 0.5rem;
            }

            .chat-area {
                padding: 0 0.5rem;
            }

            .input-container {
                flex-wrap: wrap;
            }

            .chat-form {
                width: 100%;
                order: 1;
            }

            select,
            button.secondary {
                order: 2;
            }
        }

        @media (max-width: 480px) {
            .message-content {
                padding: 1rem 1.25rem;
            }

            button {
                padding: 0.75rem 1.25rem;
                font-size: 0.9rem;
            }

            input[type="text"],
            select {
                padding: 0.75rem 1rem;
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">Stock Market Agent</div>
    </header>

    <main>
        <div class="chat-area" id="chatOutput">
            <div class="empty-state">
                <h2>Welcome!</h2>
                <p>Ask about any company or stock to get started.</p>
            </div>
        </div>
    </main>

    <div class="bottom-bar">
        <div class="input-container">
            <form class="chat-form" id="chatForm">
                <input 
                    type="text" 
                    id="chatInput" 
                    placeholder="Ask about a company or stock..." 
                    required 
                    autocomplete="off"
                />
                <button type="submit" class="primary">Send</button>
            </form>
            
            <select id="modelSelect">
                <option value="llama3">Llama 3</option>
                <option value="qwen3">Qwen 3</option>
                <option value="gemma3">Gemma 3</option>
            </select>
            
            <button type="button" id="resetBtn" class="secondary">Reset</button>
        </div>
    </div>

    <script>
        // ===================================================================
        // Application State
        // ===================================================================
        const state = {
            chatHistory: [],
            isLoading: false
        };

        // ===================================================================
        // DOM Elements
        // ===================================================================
        const elements = {
            chatForm: document.getElementById('chatForm'),
            chatInput: document.getElementById('chatInput'),
            chatOutput: document.getElementById('chatOutput'),
            modelSelect: document.getElementById('modelSelect'),
            resetBtn: document.getElementById('resetBtn')
        };

        // ===================================================================
        // Utility Functions
        // ===================================================================
        const utils = {
            scrollToBottom() {
                window.scrollTo({
                    top: document.body.scrollHeight,
                    behavior: 'smooth'
                });
            },

            formatMessage(role, content) {
                const isUser = role === 'user';
                const label = isUser ? 'You' : 'Agent';
                const messageClass = isUser ? 'user' : 'agent';
                
                return `
                    <div class="message">
                        <div class="message-label">${label}</div>
                        <div class="message-content ${messageClass}">
                            ${content}
                        </div>
                    </div>
                `;
            },

            showLoading() {
                const loadingHtml = `
                    <div class="message">
                        <div class="message-label">Agent</div>
                        <div class="message-content agent">
                            <div class="loading"></div> Thinking...
                        </div>
                    </div>
                `;
                elements.chatOutput.insertAdjacentHTML('beforeend', loadingHtml);
                this.scrollToBottom();
            },

            removeLoading() {
                const loadingMsg = elements.chatOutput.querySelector('.message:last-child');
                if (loadingMsg && loadingMsg.textContent.includes('Thinking')) {
                    loadingMsg.remove();
                }
            },

            clearEmptyState() {
                const emptyState = elements.chatOutput.querySelector('.empty-state');
                if (emptyState) {
                    emptyState.remove();
                }
            }
        };

        // ===================================================================
        // Chat Functions
        // ===================================================================
        const chat = {
            async sendMessage(userMessage) {
                // Add user message to history and UI
                state.chatHistory.push({ role: 'user', content: userMessage });
                utils.clearEmptyState();
                elements.chatOutput.insertAdjacentHTML('beforeend', utils.formatMessage('user', userMessage));
                
                // Show loading state
                state.isLoading = true;
                utils.showLoading();
                elements.chatInput.disabled = true;
                
                try {
                    // Call API
                    const response = await fetch('/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            history: state.chatHistory,
                            model: elements.modelSelect.value
                        })
                    });

                    if (!response.ok) {
                        throw new Error('Network response was not ok');
                    }

                    const data = await response.json();
                    
                    // Remove loading and add agent response
                    utils.removeLoading();
                    
                    if (data.reply) {
                        state.chatHistory.push({ role: 'assistant', content: data.reply });
                        elements.chatOutput.insertAdjacentHTML('beforeend', utils.formatMessage('assistant', data.reply));
                    } else {
                        throw new Error('No reply received');
                    }
                } catch (error) {
                    console.error('Error:', error);
                    utils.removeLoading();
                    elements.chatOutput.insertAdjacentHTML(
                        'beforeend',
                        utils.formatMessage('assistant', `<span style="color: #e74c3c;">Sorry, something went wrong. Please try again.</span>`)
                    );
                } finally {
                    state.isLoading = false;
                    elements.chatInput.disabled = false;
                    elements.chatInput.focus();
                    utils.scrollToBottom();
                }
            },

            reset() {
                state.chatHistory = [];
                elements.chatOutput.innerHTML = `
                    <div class="empty-state">
                        <h2>Welcome!</h2>
                        <p>Ask about any company or stock to get started.</p>
                    </div>
                `;
                elements.chatInput.value = '';
                elements.chatInput.focus();
            }
        };

        // ===================================================================
        // Event Listeners
        // ===================================================================
        elements.chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const userMessage = elements.chatInput.value.trim();
            if (!userMessage || state.isLoading) return;
            
            // Clear input immediately
            elements.chatInput.value = '';
            
            // Send message
            await chat.sendMessage(userMessage);
        });

        elements.resetBtn.addEventListener('click', () => {
            if (state.isLoading) return;
            chat.reset();
        });

        // Focus input on page load
        window.addEventListener('load', () => {
            elements.chatInput.focus();
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            // Escape to reset (if not loading)
            if (e.key === 'Escape' && !state.isLoading) {
                chat.reset();
            }
        });
    </script>
</body>
</html>
