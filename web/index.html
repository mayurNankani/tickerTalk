<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TickerTalk</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-left">
            <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
            </svg>
            <div class="logo">Ticker<span>Talk</span></div>
        </div>
        <div class="header-right">
            <button class="theme-toggle" id="themeToggle" title="Toggle theme">☀️</button>
        </div>
    </header>

    <main>
        <div class="chat-area" id="chatOutput">
            <div class="empty-state">
                <div class="hero-icon">
                    <svg width="72" height="72" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect width="72" height="72" rx="18" fill="rgba(20,184,166,0.1)"/>
                        <polyline points="14,52 26,34 36,42 48,24 58,30" stroke="#14b8a6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                        <circle cx="58" cy="30" r="3.5" fill="#14b8a6"/>
                    </svg>
                </div>
                <h2>Welcome to TickerTalk</h2>
                <p>Real-time stock analysis powered by AI. Ask about any company.</p>
                <div class="example-chips">
                    <button class="example-chip" onclick="useExample(this)">Analyse Apple</button>
                    <button class="example-chip" onclick="useExample(this)">How is Tesla doing?</button>
                    <button class="example-chip" onclick="useExample(this)">Give me a NVIDIA report</button>
                </div>
            </div>

            <!-- Market Overview Sections -->
            <div class="market-overview" id="marketOverview">
                <div class="market-summary" id="marketSummary" style="display: none;">
                    <div class="market-summary-header">
                        <div>
                            <div class="market-summary-kicker" id="marketSummaryKicker">Market Summary</div>
                            <div class="market-summary-title" id="marketSummaryTitle"></div>
                        </div>
                        <div class="market-summary-badge" id="marketSummaryBadge">LIVE</div>
                    </div>
                    <div class="market-summary-text" id="marketSummaryText"></div>
                    <div class="market-summary-actions" id="marketSummaryActions"></div>
                    <div class="market-summary-meta" id="marketSummaryMeta"></div>
                </div>

                <!-- Most Active Section -->
                <div class="market-section" id="activeSection" style="display: none;">
                    <div class="market-section-title">Most Active</div>
                    <div class="card-carousel" id="activeCarousel"></div>
                </div>

                <div class="market-accordion-row">
                    <div class="market-section" id="gainersSection">
                        <div class="market-section-title">Top Gainers</div>
                        <div class="card-carousel" id="gainersCarousel"></div>
                    </div>
                    <div class="market-section" id="moversSection">
                        <div class="market-section-title">Top Movers</div>
                        <div class="card-carousel" id="moversCarousel"></div>
                    </div>
                    <div class="market-section" id="losersSection">
                        <div class="market-section-title">Top Losers</div>
                        <div class="card-carousel" id="losersCarousel"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Quick Preview Modal -->
        <div class="modal" id="previewModal">
            <div class="modal-content">
                <button class="modal-close" onclick="closeModal()">✕</button>
                
                <div class="modal-header">
                    <img id="modalLogo" class="modal-logo" src="" alt="" onerror="this.style.display='none'" style="display:none"/>
                    <div>
                        <div class="modal-symbol" id="modalSymbol">AAPL</div>
                        <div class="modal-name" id="modalName">Apple Inc.</div>
                    </div>
                </div>

                <div class="modal-price-section">
                    <div class="modal-price" id="modalPrice">$150.00</div>
                    <div class="modal-change" id="modalChange">
                        <span id="modalChangeIcon">▲</span>
                        <span id="modalChangeValue">+1.23%</span>
                    </div>
                </div>

                <div class="modal-details">
                    <div class="modal-detail-item">
                        <div class="modal-detail-label">52W High</div>
                        <div class="modal-detail-value" id="modalHigh">$175.00</div>
                    </div>
                    <div class="modal-detail-item">
                        <div class="modal-detail-label">52W Low</div>
                        <div class="modal-detail-value" id="modalLow">$125.00</div>
                    </div>
                    <div class="modal-detail-item">
                        <div class="modal-detail-label">Market Cap</div>
                        <div class="modal-detail-value" id="modalMarketCap">$2.5T</div>
                    </div>
                    <div class="modal-detail-item">
                        <div class="modal-detail-label">Volume</div>
                        <div class="modal-detail-value" id="modalVolume">52.3M</div>
                    </div>
                </div>

                <div class="modal-actions">
                    <button class="modal-btn primary" onclick="analyzeFromModal()">Analyze</button>
                    <button class="modal-btn secondary" onclick="closeModal()">Cancel</button>
                </div>
            </div>
        </div>
    </main>

    <div id="scrollIndicator" title="Scroll to bottom">↓</div>

    <div class="bottom-bar">
        <div class="input-container">
            <form class="chat-form" id="chatForm">
                <input
                    class="chat-input"
                    id="chatInput"
                    placeholder="Ask about a company or stock..."
                    required
                    autocomplete="off"
                />
                <button type="submit" class="send-btn" title="Send">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"/>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                    </svg>
                </button>
                <button type="button" id="stopBtn" class="stop-btn" title="Stop processing" aria-label="Stop processing" disabled>
                    <span class="stop-square" aria-hidden="true"></span>
                </button>
            </form>

            <div class="model-select-wrap">
                <select id="modelSelect">
                    <option value="llama3">Llama 3</option>
                    <option value="qwen3">Qwen 3</option>
                    <option value="gemma3">Gemma 3</option>
                </select>
            </div>

            <div class="index-control">
                <input id="indexInput" class="index-input-field" title="Select or type an index symbol (e.g. ^GSPC) or 'SYMBOL|Friendly Name'" placeholder="Index (e.g. ^GSPC)" />
                <div id="indexSuggestions" class="index-suggestions" aria-hidden="true"></div>
            </div>

            <div id="indexMsg" style="display:none;"></div>

            <button type="button" id="resetBtn" class="secondary">Reset</button>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
